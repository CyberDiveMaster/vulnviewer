name: Update Vulnrichment data

on:
  schedule:
    # Every 10 minutes. Cheap because most runs hit the "check" step below
    # and exit immediately -- the expensive clone-restore/mine/export/commit
    # steps only run on the (much rarer) polls where upstream actually
    # changed. Trial period: watch how fast
    # https://api.github.com/repos/CyberDiveMaster/vulnviewer's `size` field
    # grows and revisit if needed.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: vulnviewer-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vulnviewer
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Needed to read last_processed_sha for the cheap check below. Cache
      # restore itself is fast (no git operations involved), unlike
      # restoring/fetching the ~300MB vulnrichment clone.
      - name: Restore vulnviewer DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/vulnviewer.db
          key: vulnviewer-db-${{ github.run_id }}
          restore-keys: |
            vulnviewer-db-

      # Single GitHub API call comparing upstream's current HEAD sha against
      # our last_processed_sha -- no clone, no fetch. This is what makes a
      # 10-minute schedule cheap: everything below only runs when this
      # says something actually changed.
      - name: Check for new upstream commits
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_remote_head.py

      # Both caches below use a run_id-suffixed key + prefix restore-keys,
      # with an explicit restore/save split (not the bundled actions/cache
      # action). actions/cache only auto-saves at the end of a job when the
      # exact key was a MISS; with a fixed key that already exists from an
      # earlier run, later runs would keep restoring the same stale snapshot
      # forever and never persist that run's updates. The run_id suffix
      # guarantees a "miss" (thus a save) every run, while restore-keys still
      # finds the most recent prior snapshot to restore from.
      - name: Restore vulnrichment clone cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: vendor_repo_cache/vulnrichment
          key: vulnrichment-clone-${{ github.run_id }}
          restore-keys: |
            vulnrichment-clone-

      - name: Run incremental update
        if: steps.check.outputs.changed == 'true'
        run: python scripts/update_incremental.py

      - name: Export static JSON (gzip-compressed)
        if: steps.check.outputs.changed == 'true'
        run: python scripts/export_json.py

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cves.json.gz
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Vulnrichment data"
            git push
          fi

      # data/vulnviewer.db (~180MB+ and growing) is NEVER committed to git --
      # it exceeds GitHub's 100MB per-file push limit. It persists only as
      # an Actions cache entry. If this cache is ever missing/evicted,
      # update_incremental.py detects the missing baseline and automatically
      # re-mines the full history itself (slower that one run, but no manual
      # intervention needed).
      - name: Save vulnrichment clone cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor_repo_cache/vulnrichment
          key: vulnrichment-clone-${{ github.run_id }}

      - name: Save vulnviewer DB cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/vulnviewer.db
          key: vulnviewer-db-${{ github.run_id }}
