name: Update Vulnrichment data

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}

concurrency:
  group: vulnviewer-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vulnviewer
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Cache vulnrichment clone
        uses: actions/cache@v4
        with:
          path: vendor_repo_cache/vulnrichment
          key: vulnrichment-clone-v1
          restore-keys: |
            vulnrichment-clone-

      - name: Run incremental update
        run: python scripts/update_incremental.py

      - name: Export static JSON
        run: python scripts/export_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vulnviewer.db docs/data/cves.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Vulnrichment data"
            git push
          fi
